<!doctype html>
<html lang="en" style="height:100%">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Doctors</title>
  <link href="../../css/doctor.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet">
  <link href="//cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
 </head>
 <body style="height:100%">
  <div class="app-wrapper">
   <header class="page-header">
    <h1 id="pageTitle">Manage Doctors</h1>
    <div class="accent-line"></div>
   </header>
   <div class="main-content">
    
    <!-- Add Doctor Form -->
    <div class="form-card">
     <h2 id="formHeading">Add New Doctor</h2>

     <form id="doctorForm" class="form-grid" novalidate method="post" onsubmit="handleDoctors(event)">
      <div class="field-group">
        <label for="doctorName">Doctor Name</label> 
        <input type="text" id="doctorName" placeholder="Dr. Jane Smith" autocomplete="off"> 
        <span class="error-text" id="nameError"></span>
      </div>
      <div class="field-group">
        <label for="specialization">Specialization</label> 
        <input type="text" id="specialization" placeholder="Cardiology" autocomplete="off"> 
        <span class="error-text" id="specError"></span>
      </div>
      <div class="field-group">
        <label for="contact">Contact Number</label> 
        <input type="tel" id="contact" placeholder="+1 555-123-4567" autocomplete="off"> 
        <span class="error-text" id="contactError"></span>
      </div>
      <div class="field-group">
        <label for="email">Email Address</label> 
        <input type="email" id="email" placeholder="jane.smith@hospital.com" autocomplete="off"> 
        <span class="error-text" id="emailError"></span>
      </div>
      <button class="btn-add" id="submitBtn" onclick="updateDoctor()">Add Doctor</button>
     </form>
    </div>
    
    <!-- Doctors Table -->
    <div class="table-card">
     <div class="table-header-bar">
      <h2>Doctor Directory</h2>
      <span class="doctor-count" id="doctorCount">0 doctors</span>
     </div>
      <div class="table-scroll">
        <table id="doctorsTable">
        <thead>
          <tr>
          <th>Doctor Name</th>
          <th>Specialization</th>
          <th>Contact</th>
          <th>Email</th>
          <th>Actions</th>
          </tr>
        </thead>
        <tbody id="doctorsBody">
        </tbody>
        </table>
      </div>
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
        🩺
        </div>
        <p>No doctors added yet.<br>
        Use the form above to add your first doctor.</p>
      </div>
    </div>
   </div>
  </div>
  
  <!-- Delete Confirmation -->
  <div class="confirm-overlay" id="confirmOverlay">
   <div class="confirm-box">
    <h3>Delete Doctor?</h3>
    <p id="confirmText">This action cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn-confirm-del" id="confirmDelBtn">Delete</button> 
      <button class="btn-confirm-cancel" id="confirmCancelBtn">Cancel</button>
    </div>
   </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
</body>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="../../javascript/doctor.js"></script>
</html>
